name: Mobile CI

on:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  flutter:
    name: Flutter analyze, test, and debug build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Employee Android flavor
        run: >
          flutter build apk --debug
          --flavor employee
          -t lib/main_employee.dart
          --dart-define=APP_ENV=staging
          --dart-define=API_BASE_URL=https://workforce-management-production.up.railway.app

      - name: Build Manager Android flavor
        run: >
          flutter build apk --debug
          --flavor manager
          -t lib/main_manager.dart
          --dart-define=APP_ENV=staging
          --dart-define=API_BASE_URL=https://workforce-management-production.up.railway.app

      - name: Build Admin Android flavor
        run: >
          flutter build apk --debug
          --flavor admin
          -t lib/main_admin.dart
          --dart-define=APP_ENV=staging
          --dart-define=API_BASE_URL=https://workforce-management-production.up.railway.app

      - name: Build Platform Android flavor
        run: >
          flutter build apk --debug
          --flavor platform
          -t lib/main_platform.dart
          --dart-define=APP_ENV=staging
          --dart-define=API_BASE_URL=https://workforce-management-production.up.railway.app
