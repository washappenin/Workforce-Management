name: Mobile iOS Flavor Builds

on:
  workflow_dispatch:

jobs:
  ios:
    name: Build iOS flavors without code signing
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify iOS flavors
        run: bash scripts/verify_ios_flavors.sh
